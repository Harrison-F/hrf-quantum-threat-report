<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quantum Threat to Bitcoin — HRF Financial Freedom Report</title>
<meta name="description" content="How cryptographically relevant quantum computers could threaten the financial freedom tool that dissidents and human rights defenders rely on.">
<meta property="og:title" content="The Quantum Threat to Bitcoin">
<meta property="og:description" content="How quantum computers could threaten Bitcoin's role as freedom money for dissidents — and what the Bitcoin community can do about it.">
<meta property="og:image" content="https://hrf.org/wp-content/uploads/2025/10/Latest-Thumbnail-The-Quantum-Threat-to-Bitcoin-V1.png">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Quantum Threat to Bitcoin">
<meta name="twitter:image" content="https://hrf.org/wp-content/uploads/2025/10/Latest-Thumbnail-The-Quantum-Threat-to-Bitcoin-V1.png">

<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
<!-- StPageFlip (local bundle — no CDN dependency) -->
<script src="page-flip.browser.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8792B;
    --black: #1a1a1a;
    --charcoal: #333;
    --gray: #888;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .header-logo {
    height: 28px;
    opacity: 0.9;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.7);
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.4);
  }

  .btn-orange {
    background: var(--orange);
    border-color: var(--orange);
  }

  .btn-orange:hover {
    background: #d06a20;
    border-color: #d06a20;
  }

  /* Flipbook Container */
  .flipbook-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    width: 100%;
    position: relative;
  }

  #flipbook-container {
    /* Will be sized by JS */
  }

  .page-canvas {
    background: #fff;
  }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(232,121,43,0.2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    margin-top: 16px;
    font-size: 14px;
    color: var(--gray);
  }

  .loading-progress {
    margin-top: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }

  /* Navigation */
  .nav-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 12px 0 20px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    background: transparent;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .page-indicator {
    font-size: 13px;
    color: var(--gray);
    min-width: 80px;
    text-align: center;
  }

  /* Fullscreen hint */
  .fullscreen-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Prevent overscroll on mobile */
  html, body {
    overscroll-behavior: none;
    -webkit-overflow-scrolling: auto;
  }

  /* Mobile */
  @media (max-width: 768px) {
    body {
      min-height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .header {
      padding: 8px 12px;
    }

    .header-logo { height: 22px; }

    .header-title { display: none; }

    .header-actions { gap: 8px; }

    .btn {
      padding: 8px 12px;
      font-size: 11px;
    }

    .flipbook-wrapper {
      padding: 8px 2px;
      flex: 1;
      overflow: hidden;
    }

    .nav-controls {
      padding: 6px 0 12px;
      gap: 20px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      font-size: 22px;
      -webkit-tap-highlight-color: transparent;
    }

    .page-indicator {
      font-size: 14px;
    }

    .fullscreen-hint { display: none; }

    .loading-text { font-size: 13px; }
    .loading-progress { font-size: 11px; }
  }

  /* Small phones */
  @media (max-width: 380px) {
    .header { padding: 6px 10px; }
    .btn { padding: 6px 10px; font-size: 10px; }
    .header-logo { height: 18px; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading report…</div>
  <div class="loading-progress" id="loading-progress"></div>
</div>

<!-- Header -->
<div class="header">
  <img class="header-logo" src="https://hrf.org/wp-content/uploads/2024/09/HRF-logo-Recent-publications.png" alt="HRF" style="filter:brightness(0) invert(1)">
  <span class="header-title">The Quantum Threat to Bitcoin</span>
  <div class="header-actions">
    <a class="btn" href="quantum-threat-report-v1.pdf" download>↓ PDF</a>
    <a class="btn" href="report.html" target="_blank">Full Page</a>
  </div>
</div>

<!-- Flipbook -->
<div class="flipbook-wrapper">
  <div id="flipbook-container"></div>
</div>

<!-- Navigation -->
<div class="nav-controls">
  <button class="nav-btn" id="prev-btn" disabled>‹</button>
  <span class="page-indicator" id="page-indicator">Loading…</span>
  <button class="nav-btn" id="next-btn" disabled>›</button>
</div>

<div class="fullscreen-hint">Press F for fullscreen</div>

<script type="module">
  const progressEl = document.getElementById('loading-progress');
  const loadingEl = document.getElementById('loading');
  const isMobile = window.innerWidth <= 768;

  try {
    // Import pdf.js
    progressEl.textContent = 'Loading PDF engine…';
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';

    // Check StPageFlip loaded
    if (typeof St === 'undefined' || !St.PageFlip) {
      throw new Error('StPageFlip library failed to load');
    }

    const PDF_URL = 'quantum-threat-report-v1.pdf';
    const RENDER_SCALE = isMobile ? 1.5 : 2;

    // 1) Load PDF
    progressEl.textContent = 'Downloading PDF…';
    const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
    const totalPages = pdf.numPages;

    // 2) Render all pages to image data URLs
    const pageDataUrls = [];
    let pageWidth = 0;
    let pageHeight = 0;

    for (let i = 1; i <= totalPages; i++) {
      progressEl.textContent = `Rendering page ${i} of ${totalPages}…`;
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: RENDER_SCALE });

      if (i === 1) {
        pageWidth = viewport.width;
        pageHeight = viewport.height;
      }

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;

      pageDataUrls.push(canvas.toDataURL('image/jpeg', 0.90));
      // Release canvas memory
      canvas.width = 0;
      canvas.height = 0;
    }

    progressEl.textContent = 'Building flipbook…';

    // 3) Calculate size using window dimensions (reliable, no flex dependency)
    const aspectRatio = pageHeight / pageWidth;

    function calcSize() {
      const headerH = document.querySelector('.header').offsetHeight || 48;
      const navH = document.querySelector('.nav-controls').offsetHeight || 56;
      const availW = window.innerWidth - (isMobile ? 16 : 48);
      const availH = window.innerHeight - headerH - navH - (isMobile ? 24 : 48);

      let pW, pH;

      if (isMobile) {
        pW = Math.min(availW, 500);
        pH = pW * aspectRatio;
        if (pH > availH) {
          pH = availH;
          pW = pH / aspectRatio;
        }
      } else {
        // Spread: each page is half the total width
        pW = Math.min(availW / 2, 480);
        pH = pW * aspectRatio;
        if (pH > availH) {
          pH = availH;
          pW = pH / aspectRatio;
        }
      }

      return { width: Math.max(Math.round(pW), 200), height: Math.max(Math.round(pH), 280) };
    }

    const size = calcSize();

    // 4) Build flipbook
    const container = document.getElementById('flipbook-container');
    const flipBook = new St.PageFlip(container, {
      width: size.width,
      height: size.height,
      size: 'stretch',
      minWidth: 200,
      maxWidth: 900,
      minHeight: 280,
      maxHeight: 1200,
      showCover: true,
      maxShadowOpacity: isMobile ? 0.15 : 0.3,
      mobileScrollSupport: false,
      swipeDistance: isMobile ? 15 : 30,
      clickEventForward: false,
      useMouseEvents: true,
      flippingTime: isMobile ? 500 : 700,
      startZIndex: 0,
      autoSize: true,
      drawShadow: true,
      usePortrait: isMobile,
      startPage: 0
    });

    // Create page elements
    const pages = [];
    for (let i = 0; i < totalPages; i++) {
      const div = document.createElement('div');
      div.className = 'page-canvas';
      div.style.cssText = 'width:100%;height:100%;overflow:hidden;background:#fff;';
      const img = document.createElement('img');
      img.src = pageDataUrls[i];
      img.style.cssText = 'width:100%;height:100%;object-fit:fill;display:block;';
      div.appendChild(img);
      pages.push(div);
    }

    flipBook.loadFromHTML(pages);

    // 5) Navigation
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const pageIndicator = document.getElementById('page-indicator');

    function updateNav() {
      try {
        const current = flipBook.getCurrentPageIndex();
        pageIndicator.textContent = `${current + 1} of ${totalPages}`;
        prevBtn.disabled = current <= 0;
        nextBtn.disabled = current >= totalPages - 1;
      } catch(e) {}
    }

    prevBtn.addEventListener('click', () => flipBook.flipPrev());
    nextBtn.addEventListener('click', () => flipBook.flipNext());
    flipBook.on('flip', updateNav);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') flipBook.flipPrev();
      else if (e.key === 'ArrowRight') flipBook.flipNext();
      else if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }
    });

    updateNav();
    prevBtn.disabled = false;
    nextBtn.disabled = false;

    // 6) Hide loading
    loadingEl.classList.add('hidden');
    setTimeout(() => loadingEl.remove(), 500);

    // 7) Touch handling for mobile
    if (isMobile) {
      const wrapper = document.querySelector('.flipbook-wrapper');
      wrapper.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    }

    // 8) Resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const ns = calcSize();
        try { flipBook.updateFromData({ width: ns.width, height: ns.height }); } catch(e) {}
      }, 250);
    });

  } catch (err) {
    console.error('Flipbook error:', err);
    document.querySelector('.loading-text').textContent = 'Error loading flipbook';
    progressEl.textContent = err.message || String(err);
    // Show a link instead of auto-redirect (helps debugging)
    const linkDiv = document.createElement('div');
    linkDiv.style.cssText = 'margin-top:16px;text-align:center';
    linkDiv.innerHTML = '<a href="quantum-threat-report-v1.pdf" style="color:#E8792B;font-size:14px;text-decoration:underline">Open PDF directly</a> · <a href="report.html" style="color:#E8792B;font-size:14px;text-decoration:underline;margin-left:12px">Open HTML report</a>';
    progressEl.parentElement.appendChild(linkDiv);
  }
</script>

</body>
</html>
