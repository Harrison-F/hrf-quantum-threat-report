<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quantum Threat to Bitcoin — HRF Financial Freedom Report</title>
<meta name="description" content="How cryptographically relevant quantum computers could threaten the financial freedom tool that dissidents and human rights defenders rely on.">
<meta property="og:title" content="The Quantum Threat to Bitcoin">
<meta property="og:description" content="How quantum computers could threaten Bitcoin's role as freedom money for dissidents — and what the Bitcoin community can do about it.">
<meta property="og:image" content="https://hrf.org/wp-content/uploads/2025/10/Latest-Thumbnail-The-Quantum-Threat-to-Bitcoin-V1.png">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Quantum Threat to Bitcoin">
<meta name="twitter:image" content="https://hrf.org/wp-content/uploads/2025/10/Latest-Thumbnail-The-Quantum-Threat-to-Bitcoin-V1.png">

<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
<!-- StPageFlip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/page-flip/2.0.7/js/page-flip.browser.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8792B;
    --black: #1a1a1a;
    --charcoal: #333;
    --gray: #888;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .header-logo {
    height: 28px;
    opacity: 0.9;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.7);
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.4);
  }

  .btn-orange {
    background: var(--orange);
    border-color: var(--orange);
  }

  .btn-orange:hover {
    background: #d06a20;
    border-color: #d06a20;
  }

  /* Flipbook Container */
  .flipbook-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    width: 100%;
    position: relative;
  }

  #flipbook-container {
    /* Will be sized by JS */
  }

  .page-canvas {
    background: #fff;
  }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(232,121,43,0.2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    margin-top: 16px;
    font-size: 14px;
    color: var(--gray);
  }

  .loading-progress {
    margin-top: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }

  /* Navigation */
  .nav-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 12px 0 20px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    background: transparent;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .page-indicator {
    font-size: 13px;
    color: var(--gray);
    min-width: 80px;
    text-align: center;
  }

  /* Fullscreen hint */
  .fullscreen-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .header { padding: 10px 16px; }
    .header-title { display: none; }
    .flipbook-wrapper { padding: 12px 4px; }
    .nav-controls { padding: 8px 0 16px; }
    .fullscreen-hint { display: none; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading report…</div>
  <div class="loading-progress" id="loading-progress"></div>
</div>

<!-- Header -->
<div class="header">
  <img class="header-logo" src="https://hrf.org/wp-content/uploads/2024/09/HRF-logo-Recent-publications.png" alt="HRF" style="filter:brightness(0) invert(1)">
  <span class="header-title">The Quantum Threat to Bitcoin</span>
  <div class="header-actions">
    <a class="btn" href="quantum-threat-report.pdf" download>↓ PDF</a>
    <a class="btn" href="report.html" target="_blank">Full Page</a>
  </div>
</div>

<!-- Flipbook -->
<div class="flipbook-wrapper">
  <div id="flipbook-container"></div>
</div>

<!-- Navigation -->
<div class="nav-controls">
  <button class="nav-btn" id="prev-btn" disabled>‹</button>
  <span class="page-indicator" id="page-indicator">Loading…</span>
  <button class="nav-btn" id="next-btn" disabled>›</button>
</div>

<div class="fullscreen-hint">Press F for fullscreen</div>

<script type="module">
  // Import pdf.js
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';

  const PDF_URL = 'quantum-threat-report.pdf';
  const RENDER_SCALE = 2; // Higher = sharper
  const progressEl = document.getElementById('loading-progress');
  const loadingEl = document.getElementById('loading');

  // 1) Load PDF
  progressEl.textContent = 'Downloading PDF…';
  const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
  const totalPages = pdf.numPages;
  progressEl.textContent = `Rendering ${totalPages} pages…`;

  // 2) Render all pages to canvases
  const pageImages = [];

  for (let i = 1; i <= totalPages; i++) {
    progressEl.textContent = `Rendering page ${i} of ${totalPages}…`;
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: RENDER_SCALE });

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');

    await page.render({ canvasContext: ctx, viewport }).promise;

    // Convert to image for better performance in flipbook
    const img = new Image();
    img.src = canvas.toDataURL('image/jpeg', 0.92);
    await new Promise(resolve => { img.onload = resolve; });

    pageImages.push({
      width: viewport.width,
      height: viewport.height,
      img: img
    });
  }

  // 3) Calculate flipbook size
  const firstPage = pageImages[0];
  const aspectRatio = firstPage.height / firstPage.width;

  function calcSize() {
    const wrapperEl = document.querySelector('.flipbook-wrapper');
    const maxW = wrapperEl.clientWidth - 32;
    const maxH = wrapperEl.clientHeight - 16;

    // Each page is half the flipbook width (spread view)
    let pageW = Math.min(maxW / 2, 500);
    let pageH = pageW * aspectRatio;

    if (pageH > maxH) {
      pageH = maxH;
      pageW = pageH / aspectRatio;
    }

    return { width: Math.round(pageW), height: Math.round(pageH) };
  }

  const size = calcSize();

  // 4) Build flipbook
  const container = document.getElementById('flipbook-container');
  const flipBook = new St.PageFlip(container, {
    width: size.width,
    height: size.height,
    size: 'fixed',
    minWidth: 200,
    maxWidth: 800,
    minHeight: 280,
    maxHeight: 1100,
    showCover: true,
    maxShadowOpacity: 0.35,
    mobileScrollSupport: true,
    swipeDistance: 30,
    clickEventForward: false,
    useMouseEvents: true,
    flippingTime: 800,
    startZIndex: 0,
    autoSize: true,
    drawShadow: true,
    usePortrait: true,
    startPage: 0
  });

  // Create page elements
  const pagesHtml = [];
  for (let i = 0; i < totalPages; i++) {
    const div = document.createElement('div');
    div.className = 'page-canvas';
    div.style.cssText = 'width:100%;height:100%;overflow:hidden;background:#fff;';

    const imgEl = document.createElement('img');
    imgEl.src = pageImages[i].img.src;
    imgEl.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    div.appendChild(imgEl);

    pagesHtml.push(div);
  }

  flipBook.loadFromHTML(pagesHtml);

  // 5) Navigation
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const pageIndicator = document.getElementById('page-indicator');

  function updateNav() {
    const current = flipBook.getCurrentPageIndex();
    const spread = flipBook.getPageCount();
    pageIndicator.textContent = `${current + 1} of ${totalPages}`;
    prevBtn.disabled = current <= 0;
    nextBtn.disabled = current >= totalPages - 1;
  }

  prevBtn.addEventListener('click', () => { flipBook.flipPrev(); });
  nextBtn.addEventListener('click', () => { flipBook.flipNext(); });

  flipBook.on('flip', () => { updateNav(); });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { flipBook.flipPrev(); }
    else if (e.key === 'ArrowRight') { flipBook.flipNext(); }
    else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  });

  updateNav();

  // 6) Hide loading
  loadingEl.classList.add('hidden');
  setTimeout(() => loadingEl.remove(), 500);

  // 7) Resize handler
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      const newSize = calcSize();
      flipBook.updateFromData({ width: newSize.width, height: newSize.height });
    }, 200);
  });
</script>

</body>
</html>
